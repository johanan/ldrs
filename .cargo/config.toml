# Local development: use native CPU features for SIMD auto-vectorization.
# This is overridden in CI by RUSTFLAGS in build-setup.yml (cargo-dist
# ignores config.toml rustflags when RUSTFLAGS env var is set).
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native"]

[target.'cfg(target_arch = "aarch64")']
rustflags = ["-C", "target-cpu=native"]
